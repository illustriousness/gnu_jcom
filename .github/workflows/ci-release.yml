name: CI and Release

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            artifact_name: gnu_jcom-linux
            cmake_generator: Ninja
            cmake_arch_args: ""
          - name: Windows
            os: windows-latest
            artifact_name: gnu_jcom-windows
            cmake_generator: Visual Studio 17 2022
            cmake_arch_args: "-A x64"
          - name: macOS
            os: macos-latest
            artifact_name: gnu_jcom-macos
            cmake_generator: Ninja
            cmake_arch_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          modules: qtserialport qtcharts
          cache: true

      - name: Configure
        shell: bash
        run: cmake -S . -B build -G "${{ matrix.cmake_generator }}" ${{ matrix.cmake_arch_args }} -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON -DGNU_JCOM_ENABLE_QT_DEPLOYMENT=ON

      - name: Build
        shell: bash
        run: cmake --build build --config Release --parallel

      - name: Test
        shell: bash
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Install (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packageDir = Join-Path $env:GITHUB_WORKSPACE "dist/${{ matrix.artifact_name }}"
          cmake --install build --config Release --prefix "$packageDir"

      - name: Install (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          package_dir="$PWD/dist/${{ matrix.artifact_name }}"
          cmake --install build --config Release --prefix "$package_dir"

      - name: Archive package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-archives | Out-Null
          $archive = "dist-archives/${{ matrix.artifact_name }}.zip"
          if (Test-Path $archive) {
            Remove-Item $archive -Force
          }
          Compress-Archive -Path "dist/${{ matrix.artifact_name }}" -DestinationPath $archive

      - name: Archive package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist-archives
          archive="dist-archives/${{ matrix.artifact_name }}.tar.gz"
          tar -czf "$archive" -C dist "${{ matrix.artifact_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-archives/*
          if-no-files-found: error
          retention-days: 14

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --generate-notes
          fi

          while IFS= read -r -d '' asset; do
            gh release upload "$tag" "$asset" --clobber
          done < <(find release-artifacts -type f -print0)
